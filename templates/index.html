<!doctype html>
<html>
  <head>
    <title>Monday Export Tool</title>
    <style>
      body {
        font-family: Arial;
        margin: 40px;
        background: #f4f6f9;
      }

      h1 {
        color: #333;
      }

      select,
      button {
        padding: 8px;
        margin: 5px;
      }

      table {
        border-collapse: collapse;
        width: 100%;
        background: white;
      }

      table,
      th,
      td {
        border: 1px solid #ddd;
      }

      th {
        background: #2f80ed;
        color: white;
      }

      th,
      td {
        padding: 8px;
      }
    </style>
  </head>
  <body>
    <h1>📊 Monday Boards Export Tool</h1>

    <form method="POST" action="/preview">
      <label>Select Board:</label>
      <select name="board_id" required>
        <option value="">-- Select Board --</option>
        {% for b in boards %}
        <option value="{{ b.id }}">{{ b.name }}</option>
        {% endfor %}
      </select>

      <button type="submit">Preview</button>
    </form>

    <form method="POST" action="/download">
      <label>Select Board:</label>
      <select name="board_id" required>
        <option value="">-- Select Board --</option>
        {% for b in boards %}
        <option value="{{ b.id }}">{{ b.name }}</option>
        {% endfor %}
      </select>

      <button type="submit">Download CSV</button>
    </form>

    <hr />

    <div>{{ table|safe }}</div>
  </body>
</html>
